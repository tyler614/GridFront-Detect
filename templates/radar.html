{% extends "base.html" %}
{% set active_page = "radar" %}

{% block head %}
<style>
    .radar-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 12px;
    }
    .radar-outer {
        position: relative;
        width: 100%;
        max-width: 500px;
        aspect-ratio: 1;
    }
    #radar-canvas {
        width: 100%;
        height: 100%;
        border-radius: 50%;
    }
    .radar-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        padding: 8px 12px;
        background: var(--navbar);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
    }
    .stat-item {
        text-align: center;
        padding: 6px 0;
    }
    .stat-value {
        font-size: 20px;
        font-weight: 700;
        color: var(--foreground);
    }
    .stat-value.danger { color: var(--status-danger); }
    .stat-value.warning { color: var(--status-warning); }
    .stat-value.ok { color: var(--status-ok); }
    .stat-value.info { color: var(--status-info); }
    .stat-label {
        font-size: 10px;
        font-weight: 500;
        color: var(--muted-foreground);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 2px;
    }
</style>
{% endblock %}

{% block content %}
<div class="radar-wrapper">
    <div class="radar-outer">
        <canvas id="radar-canvas"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<div class="radar-stats" id="radar-stats">
    <div class="stat-item">
        <div class="stat-value info" id="stat-closest">--</div>
        <div class="stat-label">Closest</div>
    </div>
    <div class="stat-item">
        <div class="stat-value info" id="stat-danger">0</div>
        <div class="stat-label">Tracking</div>
    </div>
    <div class="stat-item">
        <div class="stat-value info" id="stat-warning">0</div>
        <div class="stat-label">Zones soon</div>
    </div>
    <div class="stat-item">
        <div class="stat-value ok" id="stat-fps">0</div>
        <div class="stat-label">FPS</div>
    </div>
</div>

<script>
const canvas = document.getElementById('radar-canvas');
const ctx = canvas.getContext('2d');

// Fixed view radius — zones removed for now so movement at 1-2 m
// physical scale is actually visible. Will reintroduce zone-based
// shading once tracking smoothness is bedded in.
const MAX_RANGE = 10;

function resizeCanvas() {
    const wrapper = canvas.parentElement;
    const size = Math.min(wrapper.clientWidth, wrapper.clientHeight);
    canvas.width = size * window.devicePixelRatio;
    canvas.height = size * window.devicePixelRatio;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawRadar(detections) {
    const w = canvas.width / window.devicePixelRatio;
    const h = canvas.height / window.devicePixelRatio;
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);

    const cx = w / 2;
    const cy = h / 2;
    const radius = Math.min(cx, cy) - 8;
    const scale = radius / MAX_RANGE;

    ctx.clearRect(0, 0, w, h);

    // Black disc — single outer ring marks the view radius. No zone
    // fills, no nested rings, no flashing. The point is to make 1-2 m
    // movements obvious; anything else competes for attention.
    ctx.fillStyle = '#050505';
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx, cy, MAX_RANGE * scale, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(120, 120, 120, 0.45)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.fillStyle = 'rgba(166, 166, 166, 0.55)';
    ctx.font = '500 10px Roboto';
    ctx.textAlign = 'left';
    ctx.fillText(MAX_RANGE + 'm', cx + 4, cy - MAX_RANGE * scale + 12);

    // Crosshairs
    ctx.strokeStyle = 'rgba(51, 51, 51, 0.6)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy - radius); ctx.lineTo(cx, cy + radius);
    ctx.moveTo(cx - radius, cy); ctx.lineTo(cx + radius, cy);
    ctx.stroke();

    // 45-degree lines
    ctx.strokeStyle = 'rgba(51, 51, 51, 0.3)';
    for (let a = Math.PI / 4; a < Math.PI * 2; a += Math.PI / 2) {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * radius, cy - Math.sin(a) * radius);
        ctx.stroke();
    }

    // Direction labels
    ctx.fillStyle = 'rgba(166, 166, 166, 0.5)';
    ctx.font = '500 11px Roboto';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('FRONT', cx, cy - radius + 14);
    ctx.fillText('REAR', cx, cy + radius - 14);
    ctx.save();
    ctx.fillText('L', cx - radius + 12, cy);
    ctx.fillText('R', cx + radius - 12, cy);
    ctx.restore();

    // Machine body (top-down rectangle) — sized in pixels relative to
    // the canvas; bigger now that the view radius is 10 m so the
    // operator can immediately see scale.
    const mw = 26, mh = 40;
    ctx.fillStyle = '#0ea5e9';
    ctx.beginPath();
    ctx.roundRect(cx - mw/2, cy - mh/2, mw, mh, 3);
    ctx.fill();
    ctx.fillStyle = '#141414';
    ctx.beginPath();
    ctx.roundRect(cx - mw/2 + 3, cy - mh/2 + 3, mw - 6, mh - 6, 2);
    ctx.fill();
    // Arrow (forward indicator)
    ctx.fillStyle = '#0ea5e9';
    ctx.beginPath();
    ctx.moveTo(cx, cy - 6);
    ctx.lineTo(cx - 4, cy);
    ctx.lineTo(cx + 4, cy);
    ctx.closePath();
    ctx.fill();

    // Detection markers — neutral color, no zone flashing.
    // Server-side WorldTracker hands us pre-smoothed positions; we add
    // a per-track render-time lerp purely for visual interpolation
    // between SSE arrivals (cab display does the same).
    const NEUTRAL = '#7dd3fc'; // soft cyan, matches machine body
    const COAST_ALPHA = 0.55;  // dim a bit while coasting

    for (const det of detections) {
        const rx = cx + (det._sx || det.x_m) * scale;
        const ry = cy - (det._sz || det.z_m) * scale;
        const opacity = det.coasting ? COAST_ALPHA : 1.0;
        ctx.globalAlpha = opacity;

        // Glow
        const grad = ctx.createRadialGradient(rx, ry, 0, rx, ry, 20);
        grad.addColorStop(0, NEUTRAL + '55');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(rx, ry, 20, 0, Math.PI * 2);
        ctx.fill();

        // Outer ring
        ctx.beginPath();
        ctx.arc(rx, ry, 8, 0, Math.PI * 2);
        ctx.strokeStyle = NEUTRAL;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Inner dot
        ctx.fillStyle = NEUTRAL;
        ctx.beginPath();
        ctx.arc(rx, ry, 4, 0, Math.PI * 2);
        ctx.fill();

        // Distance label
        ctx.fillStyle = '#f2f2f2';
        ctx.font = '700 11px Roboto';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText((det._sdist != null ? det._sdist : det.distance_m).toFixed(1) + 'm', rx, ry - 12);

        // Label type
        ctx.fillStyle = NEUTRAL;
        ctx.font = '500 9px Roboto';
        ctx.textBaseline = 'top';
        ctx.fillText((det.label || 'object').toUpperCase(), rx, ry + 12);

        ctx.globalAlpha = 1.0;
    }
}

// ── SSE-driven detection state — locked in step with the cab display ──
// Both views read from /api/spatial/stream so the dot in the radar and
// the figure in the 3D scene cannot disagree. RAF drives the actual
// redraw at the display refresh rate, with a per-track lerp toward the
// last SSE target for sub-frame visual smoothness.
let currentDetections = [];
let lastSummary = {};
let lastFps = 0;
const trackVis = new Map();   // track_id -> { x, z, dist }
const TRACK_TTL_MS = 800;     // drop entries we haven't seen recently
const trackSeen = new Map();

function ingest(data) {
    currentDetections = data.detections || [];
    lastSummary = data.summary || {};
    // Use camera fps when available so the displayed value matches the
    // cab display. Fall back to the loop fps.
    const cams = data.cameras || {};
    let realFps = 0;
    for (const cid in cams) {
        const f = cams[cid] && cams[cid].fps;
        if (f && f > realFps) realFps = f;
    }
    lastFps = realFps || data.fps || 0;
    const now = performance.now();
    for (const det of currentDetections) {
        const tid = det.track_id || ('u' + (det.label || '') + Math.round((det.x_m || 0) * 10) + '_' + Math.round((det.z_m || 0) * 10));
        det._tid = tid;
        trackSeen.set(tid, now);
    }
}

const RENDER_LERP = 0.30; // RAF-rate visual interpolation

function frame() {
    const now = performance.now();
    // GC stale visual entries
    for (const [tid, ts] of trackSeen) {
        if (now - ts > TRACK_TTL_MS) {
            trackSeen.delete(tid);
            trackVis.delete(tid);
        }
    }
    // Lerp visual position toward latest target for each detection
    for (const det of currentDetections) {
        const tid = det._tid;
        const tx = det.x_m || 0;
        const tz = det.z_m || 0;
        const td = det.distance_m != null ? det.distance_m : Math.sqrt(tx * tx + tz * tz);
        let v = trackVis.get(tid);
        if (!v) { v = { x: tx, z: tz, dist: td }; trackVis.set(tid, v); }
        v.x += (tx - v.x) * RENDER_LERP;
        v.z += (tz - v.z) * RENDER_LERP;
        v.dist += (td - v.dist) * RENDER_LERP;
        det._sx = v.x; det._sz = v.z; det._sdist = v.dist;
    }
    drawRadar(currentDetections);

    // HUD — show track count instead of zone counters; zones come back later.
    const closest = lastSummary.closest_m;
    document.getElementById('stat-closest').textContent = closest ? closest.toFixed(1) + 'm' : '--';
    document.getElementById('stat-danger').textContent = currentDetections.length;
    document.getElementById('stat-warning').textContent = (lastSummary.danger_count || 0) + (lastSummary.warning_count || 0);
    document.getElementById('stat-fps').textContent = lastFps ? lastFps.toFixed(0) : 0;

    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// Subscribe to the same SSE stream the cab display uses.
const sse = new EventSource('/api/spatial/stream');
sse.onmessage = function(e) {
    try { ingest(JSON.parse(e.data)); } catch (err) {}
};
sse.onerror = function() {
    sse.close();
    setInterval(function() {
        fetch('/api/spatial').then(function(r) { return r.json(); }).then(ingest).catch(function() {});
    }, 500);
};
</script>
{% endblock %}
