{% extends "base.html" %}
{% set active_page = "radar" %}

{% block head %}
<style>
    .radar-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 12px;
    }
    .radar-outer {
        position: relative;
        width: 100%;
        max-width: 500px;
        aspect-ratio: 1;
    }
    #radar-canvas {
        width: 100%;
        height: 100%;
        border-radius: 50%;
    }
    .radar-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        padding: 8px 12px;
        background: var(--navbar);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
    }
    .stat-item {
        text-align: center;
        padding: 6px 0;
    }
    .stat-value {
        font-size: 20px;
        font-weight: 700;
        color: var(--foreground);
    }
    .stat-value.danger { color: var(--status-danger); }
    .stat-value.warning { color: var(--status-warning); }
    .stat-value.ok { color: var(--status-ok); }
    .stat-value.info { color: var(--status-info); }
    .stat-label {
        font-size: 10px;
        font-weight: 500;
        color: var(--muted-foreground);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 2px;
    }
</style>
{% endblock %}

{% block content %}
<div class="radar-wrapper">
    <div class="radar-outer">
        <canvas id="radar-canvas"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<div class="radar-stats" id="radar-stats">
    <div class="stat-item">
        <div class="stat-value info" id="stat-closest">--</div>
        <div class="stat-label">Closest</div>
    </div>
    <div class="stat-item">
        <div class="stat-value danger" id="stat-danger">0</div>
        <div class="stat-label">Danger</div>
    </div>
    <div class="stat-item">
        <div class="stat-value warning" id="stat-warning">0</div>
        <div class="stat-label">Warning</div>
    </div>
    <div class="stat-item">
        <div class="stat-value ok" id="stat-fps">0</div>
        <div class="stat-label">FPS</div>
    </div>
</div>

<script>
const canvas = document.getElementById('radar-canvas');
const ctx = canvas.getContext('2d');

// Load config for zone distances
let ZONE_DANGER = 3;
let ZONE_WARNING = 7;
let MAX_RANGE = 10;

fetch('/api/config').then(r => r.json()).then(cfg => {
    if (cfg.zones) {
        ZONE_DANGER = cfg.zones.danger_m || 3;
        ZONE_WARNING = cfg.zones.warning_m || 7;
        MAX_RANGE = cfg.zones.max_range_m || 10;
    }
});

function resizeCanvas() {
    const wrapper = canvas.parentElement;
    const size = Math.min(wrapper.clientWidth, wrapper.clientHeight);
    canvas.width = size * window.devicePixelRatio;
    canvas.height = size * window.devicePixelRatio;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawRadar(detections) {
    const w = canvas.width / window.devicePixelRatio;
    const h = canvas.height / window.devicePixelRatio;
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);

    const cx = w / 2;
    const cy = h / 2;
    const radius = Math.min(cx, cy) - 8;
    const scale = radius / MAX_RANGE;

    ctx.clearRect(0, 0, w, h);

    // Background
    ctx.fillStyle = '#141414';
    ctx.beginPath();
    ctx.arc(cx, cy, radius + 2, 0, Math.PI * 2);
    ctx.fill();

    // Zone fills (outside in)
    // Clear zone (full circle)
    ctx.fillStyle = 'rgba(16, 185, 129, 0.04)';
    ctx.beginPath();
    ctx.arc(cx, cy, MAX_RANGE * scale, 0, Math.PI * 2);
    ctx.fill();

    // Warning zone
    ctx.fillStyle = 'rgba(234, 88, 12, 0.06)';
    ctx.beginPath();
    ctx.arc(cx, cy, ZONE_WARNING * scale, 0, Math.PI * 2);
    ctx.fill();

    // Danger zone
    ctx.fillStyle = 'rgba(220, 38, 38, 0.1)';
    ctx.beginPath();
    ctx.arc(cx, cy, ZONE_DANGER * scale, 0, Math.PI * 2);
    ctx.fill();

    // Grid rings
    const rings = [
        { r: ZONE_DANGER, color: 'rgba(255, 68, 68, 0.35)' },
        { r: ZONE_WARNING, color: 'rgba(255, 170, 68, 0.25)' },
        { r: MAX_RANGE, color: 'rgba(79, 255, 79, 0.15)' },
    ];
    for (const ring of rings) {
        const r = ring.r * scale;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = ring.color;
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Label
        ctx.fillStyle = 'rgba(166, 166, 166, 0.7)';
        ctx.font = '500 10px Roboto';
        ctx.textAlign = 'left';
        ctx.fillText(ring.r + 'm', cx + 4, cy - r + 12);
    }

    // Crosshairs
    ctx.strokeStyle = 'rgba(51, 51, 51, 0.6)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy - radius); ctx.lineTo(cx, cy + radius);
    ctx.moveTo(cx - radius, cy); ctx.lineTo(cx + radius, cy);
    ctx.stroke();

    // 45-degree lines
    ctx.strokeStyle = 'rgba(51, 51, 51, 0.3)';
    for (let a = Math.PI / 4; a < Math.PI * 2; a += Math.PI / 2) {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * radius, cy - Math.sin(a) * radius);
        ctx.stroke();
    }

    // Direction labels
    ctx.fillStyle = 'rgba(166, 166, 166, 0.5)';
    ctx.font = '500 11px Roboto';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('FRONT', cx, cy - radius + 14);
    ctx.fillText('REAR', cx, cy + radius - 14);
    ctx.save();
    ctx.fillText('L', cx - radius + 12, cy);
    ctx.fillText('R', cx + radius - 12, cy);
    ctx.restore();

    // Machine body (top-down rectangle)
    const mw = 18, mh = 28;
    ctx.fillStyle = '#0ea5e9';
    ctx.beginPath();
    ctx.roundRect(cx - mw/2, cy - mh/2, mw, mh, 3);
    ctx.fill();
    ctx.fillStyle = '#141414';
    ctx.beginPath();
    ctx.roundRect(cx - mw/2 + 3, cy - mh/2 + 3, mw - 6, mh - 6, 2);
    ctx.fill();
    // Arrow (forward indicator)
    ctx.fillStyle = '#0ea5e9';
    ctx.beginPath();
    ctx.moveTo(cx, cy - 6);
    ctx.lineTo(cx - 4, cy);
    ctx.lineTo(cx + 4, cy);
    ctx.closePath();
    ctx.fill();

    // Detection markers
    for (const det of detections) {
        const rx = cx + det.x_m * scale;
        const ry = cy - det.z_m * scale;

        let color;
        if (det.zone === 'DANGER') color = '#ff4444';
        else if (det.zone === 'WARNING') color = '#ffaa44';
        else color = '#4fff4f';

        // Glow
        const grad = ctx.createRadialGradient(rx, ry, 0, rx, ry, 20);
        grad.addColorStop(0, color + '60');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(rx, ry, 20, 0, Math.PI * 2);
        ctx.fill();

        // Outer ring
        ctx.beginPath();
        ctx.arc(rx, ry, 8, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Inner dot
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(rx, ry, 4, 0, Math.PI * 2);
        ctx.fill();

        // Distance label
        ctx.fillStyle = '#f2f2f2';
        ctx.font = '700 11px Roboto';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(det.distance_m.toFixed(1) + 'm', rx, ry - 12);

        // Label type
        ctx.fillStyle = color;
        ctx.font = '500 9px Roboto';
        ctx.textBaseline = 'top';
        ctx.fillText('PERSON', rx, ry + 12);
    }
}

// Poll and draw
async function tick() {
    try {
        const res = await fetch('/api/spatial');
        const data = await res.json();
        drawRadar(data.detections || []);

        const s = data.summary || {};
        document.getElementById('stat-closest').textContent = s.closest_m ? s.closest_m.toFixed(1) + 'm' : '--';
        document.getElementById('stat-danger').textContent = s.danger_count || 0;
        document.getElementById('stat-warning').textContent = s.warning_count || 0;
        document.getElementById('stat-fps').textContent = data.fps || 0;
    } catch (e) {}
}

setInterval(tick, 100);
tick();
</script>
{% endblock %}
