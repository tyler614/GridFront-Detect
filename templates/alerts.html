{% extends "base.html" %}
{% set active_page = "alerts" %}

{% block head %}
<style>
    .filter-bar {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }
    .filter-btn {
        display: inline-flex;
        align-items: center;
        padding: 6px 14px;
        border-radius: 9999px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted-foreground);
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .filter-btn.active {
        background: var(--foreground);
        color: var(--background);
        border-color: var(--foreground);
    }
    .filter-btn.active-danger {
        background: var(--status-danger);
        color: #fff;
        border-color: var(--status-danger);
    }
    .filter-btn.active-warning {
        background: var(--status-warning);
        color: #000;
        border-color: var(--status-warning);
    }
    .date-separator {
        padding: 8px 0 4px;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted-foreground);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="p-4 flex flex-col gap-3">
    <div class="flex justify-between items-center mb-2">
        <div>
            <h1 style="font-size:20px; font-weight:700;">Alerts</h1>
            <p class="text-sm text-muted">Proximity event history</p>
        </div>
        <div class="flex gap-2">
            <button class="btn btn-outline btn-sm" onclick="exportCSV()" title="Export CSV">
                <i data-lucide="download" style="width:16px;height:16px;"></i>
            </button>
            <button class="btn btn-outline btn-sm" onclick="clearAlerts()">Clear All</button>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" data-filter="DANGER" onclick="setFilter('DANGER', this)">Danger</button>
        <button class="filter-btn" data-filter="WARNING" onclick="setFilter('WARNING', this)">Warning</button>
    </div>

    <div id="alert-list" class="flex flex-col gap-2"></div>

    <div id="empty-alerts" class="card">
        <div class="card-content" style="text-align:center; padding:40px 16px;">
            <i data-lucide="bell-off" style="width:48px;height:48px;color:var(--muted-foreground);margin:0 auto 12px;display:block;"></i>
            <p style="font-weight:600;">No alerts yet</p>
            <p class="text-sm text-muted mt-2">Proximity alerts will appear here when persons are detected in danger or warning zones.</p>
        </div>
    </div>
</div>

<script>
// Local alert history (in production, these come from the API)
let alerts = JSON.parse(localStorage.getItem('gf_alerts') || '[]');
let currentFilter = 'all';

function addAlert(zone, count, closest, timestamp) {
    alerts.unshift({ zone, count, closest, timestamp, id: Date.now() });
    if (alerts.length > 100) alerts = alerts.slice(0, 100);
    localStorage.setItem('gf_alerts', JSON.stringify(alerts));
    renderAlerts();
}

function setFilter(filter, btnEl) {
    currentFilter = filter;
    // Update button states
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = 'filter-btn';
    });
    if (filter === 'all') btnEl.className = 'filter-btn active';
    else if (filter === 'DANGER') btnEl.className = 'filter-btn active-danger';
    else if (filter === 'WARNING') btnEl.className = 'filter-btn active-warning';
    renderAlerts();
}

function formatDateKey(ts) {
    const d = new Date(ts);
    const today = new Date();
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);

    if (d.toDateString() === today.toDateString()) return 'Today';
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}

function renderAlerts() {
    const list = document.getElementById('alert-list');
    const empty = document.getElementById('empty-alerts');

    // Apply filter
    const filtered = currentFilter === 'all'
        ? alerts
        : alerts.filter(a => a.zone === currentFilter);

    if (filtered.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
    }

    empty.style.display = 'none';

    let html = '';
    let lastDateKey = '';

    filtered.slice(0, 50).forEach(a => {
        const dateKey = formatDateKey(a.timestamp);
        if (dateKey !== lastDateKey) {
            html += `<div class="date-separator">${dateKey}</div>`;
            lastDateKey = dateKey;
        }

        const time = new Date(a.timestamp).toLocaleTimeString();
        const badgeClass = a.zone === 'DANGER' ? 'badge-danger' : 'badge-warning';
        html += `
            <div class="card">
                <div class="card-content flex justify-between items-center" style="padding:12px 16px;">
                    <div class="flex items-center gap-3">
                        <div style="width:36px;height:36px;border-radius:50%;background:${a.zone === 'DANGER' ? 'var(--status-danger-bg)' : 'var(--status-warning-bg)'};display:flex;align-items:center;justify-content:center;">
                            <i data-lucide="${a.zone === 'DANGER' ? 'alert-triangle' : 'alert-circle'}"
                               style="width:18px;height:18px;color:${a.zone === 'DANGER' ? 'var(--status-danger)' : 'var(--status-warning)'};"></i>
                        </div>
                        <div>
                            <div style="font-weight:600;font-size:14px;">
                                <span class="badge ${badgeClass}" style="margin-right:6px;">${a.zone}</span>
                                ${a.count} person${a.count > 1 ? 's' : ''}
                            </div>
                            <div class="text-xs text-muted" style="margin-top:2px;">
                                Closest: ${a.closest?.toFixed(1) || '--'}m
                            </div>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div class="text-xs text-muted">${time}</div>
                    </div>
                </div>
            </div>
        `;
    });

    list.innerHTML = html;
    lucide.createIcons();
}

function clearAlerts() {
    if (!confirm('Clear all alerts?')) return;
    alerts = [];
    localStorage.setItem('gf_alerts', JSON.stringify(alerts));
    renderAlerts();
}

function exportCSV() {
    if (alerts.length === 0) {
        alert('No alerts to export.');
        return;
    }
    const header = 'Timestamp,Zone,Count,Closest (m)\n';
    const rows = alerts.map(a => {
        const ts = new Date(a.timestamp).toISOString();
        return `${ts},${a.zone},${a.count},${a.closest != null ? a.closest.toFixed(1) : ''}`;
    }).join('\n');

    const blob = new Blob([header + rows], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'gridfront-alerts-' + new Date().toISOString().slice(0, 10) + '.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

// Listen for zone transitions and log them
let lastZone = 'CLEAR';
async function checkForAlerts() {
    try {
        const res = await fetch('/api/spatial');
        const data = await res.json();
        const s = data.summary || {};

        let currentZone = 'CLEAR';
        if (s.danger_count > 0) currentZone = 'DANGER';
        else if (s.warning_count > 0) currentZone = 'WARNING';

        // Log on zone escalation
        if (currentZone !== lastZone && currentZone !== 'CLEAR') {
            addAlert(currentZone, s.danger_count + s.warning_count, s.closest_m, Date.now());
        }
        lastZone = currentZone;
    } catch (e) {}
}

setInterval(checkForAlerts, 500);
renderAlerts();
</script>
{% endblock %}
