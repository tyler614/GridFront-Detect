<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GridFront Safety</title>

    <!-- Roboto font (matching GridFront platform) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <style>
        /* ── GridFront Design System (Dark Mode) ─────────────── */
        :root {
            --background: #121212;
            --foreground: #f2f2f2;
            --card: #1a1a1a;
            --card-foreground: #f2f2f2;
            --border: #333333;
            --input: #262626;
            --ring: #f2f2f2;
            --primary: #f2f2f2;
            --primary-foreground: #121212;
            --secondary: #262626;
            --secondary-foreground: #f2f2f2;
            --muted: #262626;
            --muted-foreground: #a6a6a6;
            --accent: #262626;
            --accent-foreground: #f2f2f2;
            --destructive: #dc2626;
            --destructive-foreground: #f2f2f2;
            --navbar: #1f1f1f;
            --navbar-foreground: #f2f2f2;
            --radius: 0.5rem;

            /* Status colors */
            --status-danger-bg: rgba(220, 38, 38, 0.15);
            --status-danger: #f44;
            --status-warning-bg: rgba(234, 88, 12, 0.15);
            --status-warning: #fa4;
            --status-ok-bg: rgba(22, 163, 74, 0.15);
            --status-ok: #4f4;
            --status-info: #0ea5e9;

            /* Chart/radar colors */
            --chart-1: #0ea5e9;
            --chart-2: #06b6d4;
            --chart-3: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--background);
            color: var(--foreground);
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        /* ── Layout ──────────────────────────────────────────── */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        /* ── Bottom Navigation (matching GridFront mobile nav) ── */
        .bottom-nav {
            display: flex;
            background: var(--navbar);
            border-top: 1px solid var(--border);
            padding: 4px 0;
            padding-bottom: env(safe-area-inset-bottom, 4px);
            flex-shrink: 0;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 4px;
            min-height: 56px;
            color: var(--muted-foreground);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            gap: 4px;
            transition: color 0.2s;
            border: none;
            background: none;
            cursor: pointer;
        }
        .nav-item.active {
            color: var(--foreground);
        }
        .nav-item:hover {
            color: var(--foreground);
        }
        .nav-item svg {
            width: 22px;
            height: 22px;
        }

        /* ── Top Header ──────────────────────────────────────── */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px;
            padding: 0 16px;
            background: var(--navbar);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .top-header .logo {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--foreground);
        }
        .top-header .logo span {
            color: var(--muted-foreground);
            font-weight: 400;
        }
        .top-header .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.connected {
            background: var(--status-ok-bg);
            color: var(--status-ok);
        }
        .status-badge.disconnected {
            background: var(--status-danger-bg);
            color: var(--status-danger);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ── Page Content ────────────────────────────────────── */
        .page-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ── Card (matches shadcn card) ──────────────────────── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .card-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--card-foreground);
        }
        .card-description {
            font-size: 13px;
            color: var(--muted-foreground);
            margin-top: 2px;
        }
        .card-content {
            padding: 16px;
        }

        /* ── Button (matches shadcn button) ──────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: calc(var(--radius) - 2px);
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            min-height: 44px;
            padding: 8px 16px;
            border: none;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }
        .btn:disabled { opacity: 0.5; pointer-events: none; }
        .btn-primary { background: var(--primary); color: var(--primary-foreground); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: var(--secondary); color: var(--secondary-foreground); }
        .btn-secondary:hover { background: #333; }
        .btn-destructive { background: var(--destructive); color: var(--destructive-foreground); }
        .btn-destructive:hover { opacity: 0.9; }
        .btn-outline { background: transparent; color: var(--foreground); border: 1px solid var(--border); }
        .btn-outline:hover { background: var(--accent); }
        .btn-ghost { background: transparent; color: var(--foreground); }
        .btn-ghost:hover { background: var(--accent); }
        .btn-sm { min-height: 36px; padding: 6px 12px; font-size: 13px; }
        .btn-icon { min-height: 44px; min-width: 44px; padding: 0; }

        /* ── Input (matches shadcn input) ─────────────────────── */
        .input {
            width: 100%;
            min-height: 44px;
            padding: 8px 12px;
            background: var(--background);
            border: 2px solid var(--border);
            border-radius: calc(var(--radius) - 2px);
            color: var(--foreground);
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        .input:focus { outline: none; border-color: var(--primary); }
        .input::placeholder { color: var(--muted-foreground); }

        /* ── Label ────────────────────────────────────────────── */
        .label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--foreground);
        }
        .label-description {
            font-size: 12px;
            color: var(--muted-foreground);
            margin-top: 2px;
        }

        /* ── Select ───────────────────────────────────────────── */
        .select {
            width: 100%;
            min-height: 44px;
            padding: 8px 12px;
            background: var(--background);
            border: 2px solid var(--border);
            border-radius: calc(var(--radius) - 2px);
            color: var(--foreground);
            font-size: 16px;
            font-family: inherit;
            appearance: none;
            cursor: pointer;
        }
        .select:focus { outline: none; border-color: var(--primary); }

        /* ── Toggle/Switch ────────────────────────────────────── */
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--muted);
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .toggle.active { background: var(--chart-3); }
        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle.active::after { transform: translateX(20px); }

        /* ── Badge ────────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-danger { background: var(--status-danger-bg); color: var(--status-danger); }
        .badge-warning { background: var(--status-warning-bg); color: var(--status-warning); }
        .badge-ok { background: var(--status-ok-bg); color: var(--status-ok); }
        .badge-muted { background: var(--muted); color: var(--muted-foreground); }

        /* ── Form Group ───────────────────────────────────────── */
        .form-group { margin-bottom: 16px; }
        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .form-row:last-child { border-bottom: none; }
        .form-row-label { flex: 1; }

        /* ── Zone banner ──────────────────────────────────────── */
        .zone-banner {
            padding: 8px 16px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            flex-shrink: 0;
        }
        .zone-banner.danger {
            background: var(--status-danger-bg);
            color: var(--status-danger);
            animation: pulse-danger 0.8s ease-in-out infinite alternate;
        }
        .zone-banner.warning { background: var(--status-warning-bg); color: var(--status-warning); }
        .zone-banner.clear { background: var(--status-ok-bg); color: var(--status-ok); }

        @keyframes pulse-danger {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        /* ── Utility ──────────────────────────────────────────── */
        .text-muted { color: var(--muted-foreground); }
        .text-sm { font-size: 13px; }
        .text-xs { font-size: 11px; }
        .mt-2 { margin-top: 8px; }
        .mt-4 { margin-top: 16px; }
        .mb-2 { margin-bottom: 8px; }
        .mb-4 { margin-bottom: 16px; }
        .p-4 { padding: 16px; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .w-full { width: 100%; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="top-header">
            <div class="logo">GridFront <span>Safety</span></div>
            <div class="status-badge connected" id="connection-badge">
                <div class="status-dot"></div>
                <span id="connection-text">Live</span>
            </div>
        </div>

        <!-- Zone Banner -->
        <div class="zone-banner clear" id="zone-banner">CLEAR</div>

        <!-- Page Content -->
        <div class="page-content" id="page-content">
            {% block content %}{% endblock %}
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="/dashboard" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                <i data-lucide="layout-dashboard"></i>
                Dashboard
            </a>
            <a href="/cameras" class="nav-item {% if active_page == 'cameras' %}active{% endif %}">
                <i data-lucide="camera"></i>
                Cameras
            </a>
            <a href="/alerts" class="nav-item {% if active_page == 'alerts' %}active{% endif %}">
                <i data-lucide="bell"></i>
                Alerts
            </a>
            <a href="/settings" class="nav-item {% if active_page == 'settings' %}active{% endif %}">
                <i data-lucide="settings"></i>
                Settings
            </a>
        </nav>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Zone banner updater
        async function updateZoneBanner() {
            try {
                const res = await fetch('/api/spatial');
                const data = await res.json();
                const banner = document.getElementById('zone-banner');
                const badge = document.getElementById('connection-badge');
                const badgeText = document.getElementById('connection-text');

                const s = data.summary || {};

                if (s.danger_count > 0) {
                    banner.className = 'zone-banner danger';
                    banner.textContent = `DANGER \u2014 ${s.danger_count} PERSON${s.danger_count > 1 ? 'S' : ''} \u2022 ${s.closest_m?.toFixed(1) || '--'}m`;
                } else if (s.warning_count > 0) {
                    banner.className = 'zone-banner warning';
                    banner.textContent = `WARNING \u2014 ${s.warning_count} NEARBY`;
                } else {
                    banner.className = 'zone-banner clear';
                    banner.textContent = 'ALL CLEAR';
                }

                badge.className = 'status-badge connected';
                badgeText.textContent = 'Live';
            } catch (e) {
                document.getElementById('connection-badge').className = 'status-badge disconnected';
                document.getElementById('connection-text').textContent = 'Offline';
            }
        }
        setInterval(updateZoneBanner, 200);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
