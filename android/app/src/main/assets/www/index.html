<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0A0A">
<title>GridFront Detect</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>window.onerror=function(m,s,l,c,e){document.body.innerHTML='<pre style="color:red;padding:20px;font-size:14px">ERROR: '+m+'\nLine: '+l+'\nCol: '+c+'\n'+(e&&e.stack||'')+'</pre>';}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; color: #F2F2F2; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
  #hud { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(18,18,18,0.95); border-top: 1px solid #262626; -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); padding: 10px 16px; font-size: 14px; color: #F2F2F2; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding-bottom: max(10px, env(safe-area-inset-bottom)); z-index: 10; }
  .hud-item { display: flex; flex-direction: column; gap: 2px; }
  .hud-item .label { font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #666; }
  .hud-item .value { font-weight: 700; font-size: 18px; color: #F2F2F2; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .dot-green { background: #22c55e; }
  .dot-red { background: #EF4444; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #header { position: fixed; top: 0; left: 0; right: 0; background: rgba(18,18,18,0.95); border-bottom: 1px solid #262626; -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); padding: 10px 16px; display: flex; align-items: center; gap: 10px; z-index: 10; padding-top: max(10px, env(safe-area-inset-top)); }
  #header .title { font-weight: 700; font-size: 17px; color: #F2F2F2; }
  #header .subtitle { font-size: 12px; color: #A6A6A6; }
  #alert-banner { position: fixed; top: 60px; left: 12px; right: 12px; background: rgba(220,38,38,0.95); border-radius: 10px; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); padding: 12px 16px; font-size: 16px; font-weight: 700; color: #FFFFFF; display: none; z-index: 10; text-align: center; box-shadow: 0 4px 24px rgba(220,38,38,0.4); }
  #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 16px; z-index: 100; }
  #loading .spinner { width: 36px; height: 36px; border: 3px solid #262626; border-top-color: #4A84BF; border-radius: 50%; animation: spin 0.8s linear infinite; }
  #loading .loading-text { font: 14px system-ui, -apple-system, sans-serif; color: #A6A6A6; letter-spacing: 0.5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="header">
  <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
    <rect x="1" y="1" width="8" height="8" rx="2" fill="#4A84BF"/>
    <rect x="12" y="1" width="8" height="8" rx="2" fill="#3CABD6"/>
    <rect x="23" y="1" width="8" height="8" rx="2" fill="#90D2E8"/>
    <rect x="1" y="12" width="8" height="8" rx="2" fill="#4A84BF"/>
    <rect x="12" y="12" width="8" height="8" rx="2" fill="#3CABD6"/>
    <rect x="23" y="12" width="8" height="8" rx="2" fill="#90D2E8"/>
    <rect x="1" y="23" width="8" height="8" rx="2" fill="#4A84BF"/>
    <rect x="12" y="23" width="8" height="8" rx="2" fill="#3CABD6"/>
    <rect x="23" y="23" width="8" height="8" rx="2" fill="#90D2E8"/>
  </svg>
  <div>
    <div class="title">GridFront Detect</div>
    <div class="subtitle" id="machine-subtitle">CAT 950 GC — Wheel Loader #1</div>
  </div>
  <div style="margin-left:auto;cursor:pointer;padding:4px" id="settings-btn" onclick="GF.settings.open()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#A6A6A6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </div>
</div>
<div id="alert-banner"></div>
<div id="canvas-container"></div>
<div id="hud">
  <div class="hud-item"><span class="label"><span class="dot dot-green" id="status-dot"></span>Mock</span><span class="value" id="status-text">OK</span></div>
  <div class="hud-item"><span class="label">People</span><span class="value" id="people-count">0</span></div>
  <div class="hud-item"><span class="label">Equipment</span><span class="value" id="equip-count">0</span></div>
  <div class="hud-item"><span class="label">Markers</span><span class="value" id="marker-count">0</span></div>
  <div class="hud-item"><span class="label">Nearest</span><span class="value" id="nearest-dist">&mdash;</span></div>
</div>

<div id="loading"><div class="spinner"></div><div class="loading-text">Initializing detection system...</div></div>
<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script src="js/materials.js"></script>
<script src="js/models/wheel-loader.js"></script>
<script src="js/models/excavator.js"></script>
<script src="js/models/dump-truck.js"></script>
<script src="js/models/dozer.js"></script>
<script src="js/models/person.js"></script>
<script src="js/models/props.js"></script>
<script src="js/scene-manager.js"></script>
<script src="js/zone-renderer.js"></script>
<script src="js/model-registry.js"></script>
<script src="js/detection-renderer.js"></script>
<script src="js/hud-controller.js"></script>
<script src="js/orbit-controls.js"></script>
<script src="js/api-client.js"></script>
<script src="js/config-manager.js"></script>
<script src="js/camera-viz.js"></script>
<script src="js/camera-placement.js"></script>
<script src="js/settings-panel.js"></script>
<script src="js/app.js"></script>
</body>
</html>
