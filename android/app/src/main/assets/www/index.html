<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F8F8F8">
<title>GridFront Detect</title>
<script>window.onerror=function(m,s,l,c,e){document.body.innerHTML='<pre style="color:red;padding:20px;font-size:14px">ERROR: '+m+'\nLine: '+l+'\nCol: '+c+'\n'+(e&&e.stack||'')+'</pre>';}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F8F8F8; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
  #canvas-container { width: 100vw; height: 100vh; }
  #hud { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); border-top: 2px solid #e5e7eb; padding: 10px 16px; font-size: 14px; color: #22384C; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding-bottom: max(10px, env(safe-area-inset-bottom)); z-index: 10; }
  .hud-item { display: flex; flex-direction: column; gap: 1px; }
  .hud-item .label { font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.5; }
  .hud-item .value { font-weight: 700; font-size: 16px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .dot-green { background: #22c55e; }
  .dot-red { background: #EF4444; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #header { position: fixed; top: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); border-bottom: 1px solid #e5e7eb; padding: 8px 16px; display: flex; align-items: center; gap: 10px; z-index: 10; padding-top: max(8px, env(safe-area-inset-top)); }
  #header .title { font-weight: 700; font-size: 15px; color: #22384C; }
  #header .subtitle { font-size: 11px; color: #6B7280; }
  #alert-banner { position: fixed; top: 56px; left: 12px; right: 12px; background: #FEF2F2; border: 2px solid #EF4444; border-radius: 8px; padding: 10px 14px; font-size: 15px; font-weight: 700; color: #991B1B; display: none; z-index: 10; text-align: center; }
</style>
</head>
<body>
<div id="header">
  <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
    <rect x="1" y="1" width="8" height="8" rx="2" fill="#4A84BF"/>
    <rect x="12" y="1" width="8" height="8" rx="2" fill="#3CABD6"/>
    <rect x="23" y="1" width="8" height="8" rx="2" fill="#90D2E8"/>
    <rect x="1" y="12" width="8" height="8" rx="2" fill="#4A84BF"/>
    <rect x="12" y="12" width="8" height="8" rx="2" fill="#3CABD6"/>
    <rect x="23" y="12" width="8" height="8" rx="2" fill="#90D2E8"/>
    <rect x="1" y="23" width="8" height="8" rx="2" fill="#4A84BF"/>
    <rect x="12" y="23" width="8" height="8" rx="2" fill="#3CABD6"/>
    <rect x="23" y="23" width="8" height="8" rx="2" fill="#90D2E8"/>
  </svg>
  <div>
    <div class="title">GridFront Detect</div>
    <div class="subtitle">CAT 950 GC — Wheel Loader #1</div>
  </div>
</div>
<div id="alert-banner"></div>
<div id="canvas-container"></div>
<div id="hud">
  <div class="hud-item"><span class="label"><span class="dot dot-green" id="status-dot"></span>Mock</span><span class="value" id="status-text">OK</span></div>
  <div class="hud-item"><span class="label">People</span><span class="value" id="people-count">0</span></div>
  <div class="hud-item"><span class="label">Equipment</span><span class="value" id="equip-count">0</span></div>
  <div class="hud-item"><span class="label">Markers</span><span class="value" id="marker-count">0</span></div>
  <div class="hud-item"><span class="label">Nearest</span><span class="value" id="nearest-dist">—</span></div>
</div>

<div id="loading" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font:16px system-ui;color:#22384C;z-index:100">Loading...</div>
<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script>
(function() {
  var loading = document.getElementById('loading');
  try {
    if (typeof THREE === 'undefined') { loading.textContent = 'ERROR: THREE not loaded'; loading.style.color = 'red'; return; }

    var container = document.getElementById('canvas-container');
    var alertBanner = document.getElementById('alert-banner');

    // Renderer
    var renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'default', alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(1);
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    var scene = new THREE.Scene();
    scene.background = new THREE.Color('#F8F8F8');

    var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);

    // Lighting — bright and even for good model visibility
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    var sun = new THREE.DirectionalLight(0xffffff, 0.9);
    sun.position.set(10, 20, 5);
    scene.add(sun);
    var fill = new THREE.DirectionalLight(0xe8f4fd, 0.3);
    fill.position.set(-5, 15, -10);
    scene.add(fill);
    scene.add(new THREE.HemisphereLight(0xddeeff, 0x998866, 0.3));

    // Ground
    var ground = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshStandardMaterial({ color: '#F0F0F3' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    scene.add(ground);
    scene.add(new THREE.GridHelper(30, 30, 0xD0D2D5, 0xE0E2E5));

    // Zone rings
    function addRing(inner, outer, color, opacity) {
      var ring = new THREE.Mesh(
        new THREE.RingGeometry(inner, outer, 128),
        new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: opacity, side: THREE.DoubleSide })
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.02;
      scene.add(ring);
    }
    addRing(3.44, 3.56, '#EF4444', 0.8);
    addRing(5.95, 6.05, '#F59E0B', 0.6);
    addRing(11.9, 12.1, '#44A5D6', 0.3);

    // =============================================
    // GLTF MODEL LOADER
    // =============================================
    var gltfLoader = new THREE.GLTFLoader();

    // Model registry — maps detection class to GLB file + scale + y-offset
    // Add entries here as you download and convert models from GrabCAD
    var MODEL_REGISTRY = {
      // GLB models disabled — they contain embedded ground planes that render as
      // giant white slabs. Using procedural fallbacks until clean models are available.
      // 'wheel_loader': { file: 'models/cat-950gc.glb', scale: 1.0, yOffset: 0 },
      // 'dozer':        { file: 'models/cat-d2.glb',    scale: 1.0, yOffset: 0 },
      // 'excavator':    { file: 'models/excavator.glb',  scale: 1.0, yOffset: 0 },
      // 'dump_truck':   { file: 'models/cat-740.glb',   scale: 1.0, yOffset: 0 },
      // 'person':       { file: 'models/person.glb',     scale: 0.65, yOffset: 0 },
      // 'cone':         { file: 'models/cone.glb',       scale: 1.0, yOffset: 0 },
    };

    // Cache loaded models so we clone instead of re-loading
    var modelCache = {};

    function loadModel(type, callback) {
      var entry = MODEL_REGISTRY[type];
      if (!entry) { callback(null); return; }
      if (modelCache[type]) { callback(modelCache[type].clone()); return; }

      console.log('Loading model: ' + entry.file);
      gltfLoader.load(entry.file, function(gltf) {
        console.log('Model loaded: ' + type);
        var model = gltf.scene;
        model.scale.setScalar(entry.scale);
        model.position.y = entry.yOffset || 0;
        // Apply color override and ensure proper encoding
        model.traverse(function(child) {
          if (child.isMesh && child.material) {
            if (child.material.map) child.material.map.encoding = THREE.sRGBEncoding;
            if (entry.color) {
              child.material = child.material.clone();
              child.material.color.set(entry.color);
              child.material.map = null;
            }
          }
        });
        modelCache[type] = model;
        callback(model.clone());
      }, undefined, function(err) {
        console.warn('Model load failed for ' + type + ':', err);
        callback(null);
      });
    }

    // =============================================
    // PROCEDURAL FALLBACKS (used when no GLB exists)
    // =============================================
    // Tesla-style muted gray palette — uniform, clean, no bright colors
    var bodyMat = new THREE.MeshStandardMaterial({ color: '#9CA3AF', metalness: 0.15, roughness: 0.7 });
    var darkMat = new THREE.MeshStandardMaterial({ color: '#4B5563', roughness: 0.85 });
    var glassMat = new THREE.MeshStandardMaterial({ color: '#CBD5E1', metalness: 0.3, roughness: 0.3, transparent: true, opacity: 0.6 });
    var metalMat = new THREE.MeshStandardMaterial({ color: '#6B7280', metalness: 0.3, roughness: 0.5 });
    var frameMat = new THREE.MeshStandardMaterial({ color: '#4B5563', metalness: 0.4, roughness: 0.4 });

    function mk(geo, mat, x, y, z, p) { var m = new THREE.Mesh(geo, mat); m.position.set(x,y,z); p.add(m); return m; }
    function mkr(geo, mat, x, y, z, rx, ry, rz, p) { var m = mk(geo,mat,x,y,z,p); if(rx)m.rotation.x=rx; if(ry)m.rotation.y=ry; if(rz)m.rotation.z=rz; return m; }

    // Rounded box via ExtrudeGeometry — kills the Minecraft look
    function rbox(w, h, d, r, mat, x, y, z, parent) {
      var hw = w/2, hd = d/2;
      r = Math.min(r, hw, hd);
      var s = new THREE.Shape();
      s.moveTo(-hw + r, -hd);
      s.lineTo(hw - r, -hd);
      s.quadraticCurveTo(hw, -hd, hw, -hd + r);
      s.lineTo(hw, hd - r);
      s.quadraticCurveTo(hw, hd, hw - r, hd);
      s.lineTo(-hw + r, hd);
      s.quadraticCurveTo(-hw, hd, -hw, hd - r);
      s.lineTo(-hw, -hd + r);
      s.quadraticCurveTo(-hw, -hd, -hw + r, -hd);
      var geo = new THREE.ExtrudeGeometry(s, { depth: h, bevelEnabled: true, bevelThickness: Math.min(r*0.6, h*0.15), bevelSize: Math.min(r*0.6, h*0.15), bevelSegments: 3 });
      geo.translate(0, 0, 0);
      geo.rotateX(-Math.PI/2);
      geo.translate(0, h, 0);
      var m = new THREE.Mesh(geo, mat);
      m.position.set(x, y, z);
      parent.add(m);
      return m;
    }

    // Wheel: tire (torus) + sidewall discs + hub
    function mkWheel(radius, width, x, y, z, parent, tireMat, hubMat) {
      var wg = new THREE.Group();
      // Tire tread — torus gives the round rubber look
      var torus = new THREE.Mesh(new THREE.TorusGeometry(radius - width*0.35, width*0.35, 12, 24), tireMat);
      torus.rotation.y = Math.PI/2;
      wg.add(torus);
      // Sidewalls — fill in the flat faces
      var side = new THREE.Mesh(new THREE.CylinderGeometry(radius - width*0.1, radius - width*0.1, width*0.5, 20), tireMat);
      side.rotation.z = Math.PI/2;
      wg.add(side);
      // Hub/rim
      var hub = new THREE.Mesh(new THREE.CylinderGeometry(radius*0.4, radius*0.4, width*0.55, 14), hubMat);
      hub.rotation.z = Math.PI/2;
      wg.add(hub);
      wg.position.set(x, y, z);
      parent.add(wg);
      return wg;
    }

    // ── WHEEL LOADER (host — darker ego machine) ──
    function fallbackWheelLoader() {
      var g = new THREE.Group();
      var hb = new THREE.MeshStandardMaterial({ color: '#4B5563', metalness: 0.3, roughness: 0.5 });
      var hd = new THREE.MeshStandardMaterial({ color: '#1F2937', roughness: 0.8 });
      var hg = new THREE.MeshStandardMaterial({ color: '#64748B', metalness: 0.5, roughness: 0.2, transparent: true, opacity: 0.5 });
      var hHub = new THREE.MeshStandardMaterial({ color: '#374151', metalness: 0.4, roughness: 0.5 });

      // Rear body (rounded)
      rbox(2.1, 1.0, 1.8, 0.2, hb, 0, 0.5, -0.9, g);
      // Engine hood (rounded top)
      rbox(1.8, 0.5, 1.4, 0.15, hb, 0, 1.5, -1.0, g);
      mk(new THREE.CylinderGeometry(0.06, 0.05, 0.6, 8), hd, -0.7, 2.3, -1.0, g);
      // Articulation joint
      mk(new THREE.CylinderGeometry(0.3, 0.3, 0.6, 16), hd, 0, 1.1, 0, g);
      // Front body
      rbox(2.0, 0.8, 1.6, 0.18, hb, 0, 0.55, 1.0, g);
      // Cab — rounded box
      rbox(1.5, 1.2, 1.4, 0.15, hb, 0, 1.6, -0.1, g);
      // Cab roof — rounded
      rbox(1.6, 0.08, 1.5, 0.12, hb, 0, 2.8, -0.1, g);
      // Windshield (curved via cylinder segment)
      var windshield = mk(new THREE.CylinderGeometry(1.2, 1.2, 1.35, 16, 1, true, -0.35, 0.7), hg, 0, 2.25, 0.3, g);
      // Side windows
      mk(new THREE.PlaneGeometry(1.2, 0.85), hg, -0.74, 2.25, -0.1, g).rotation.y = -Math.PI/2;
      mk(new THREE.PlaneGeometry(1.2, 0.85), hg, 0.74, 2.25, -0.1, g).rotation.y = Math.PI/2;
      // Boom arms (capsules for roundness)
      [-0.5, 0.5].forEach(function(x) {
        var arm = mk(new THREE.CapsuleGeometry(0.07, 2.2, 4, 8), hb, x, 1.55, 2.0, g);
        arm.rotation.x = Math.PI/2 + 0.15;
      });
      // Bucket — curved scoop via cylinder segment
      var scoop = mk(new THREE.CylinderGeometry(0.7, 0.7, 1.9, 12, 1, true, -0.8, 1.6), hb, 0, 0.75, 3.2, g);
      // Bucket lip
      mk(new THREE.CylinderGeometry(0.04, 0.04, 1.9, 8), hd, 0, 0.55, 3.7, g).rotation.z = Math.PI/2;
      // Bucket teeth
      for (var bt = -0.7; bt <= 0.7; bt += 0.28) {
        mk(new THREE.ConeGeometry(0.04, 0.14, 6), hd, bt, 0.5, 3.8, g).rotation.x = Math.PI/2;
      }
      // Wheels
      mkWheel(0.55, 0.4, -1.15, 0.55, -1.1, g, hd, hHub);
      mkWheel(0.55, 0.4,  1.15, 0.55, -1.1, g, hd, hHub);
      mkWheel(0.55, 0.4, -1.10, 0.55,  1.1, g, hd, hHub);
      mkWheel(0.55, 0.4,  1.10, 0.55,  1.1, g, hd, hHub);
      // Rounded fenders (half-cylinder)
      [-1.1, 1.1].forEach(function(x) {
        [-1.1, 1.1].forEach(function(z) {
          var f = mk(new THREE.CylinderGeometry(0.35, 0.35, 0.45, 12, 1, true, 0, Math.PI), hb, x, 0.85, z, g);
          f.rotation.y = (x > 0) ? Math.PI/2 : -Math.PI/2;
        });
      });
      return g;
    }

    // ── PERSON (smooth silhouette) ──
    function fallbackPerson(ppe) {
      var g = new THREE.Group();
      var pm = new THREE.MeshStandardMaterial({ color: '#7B8794', metalness: 0.1, roughness: 0.8 });
      var pd = new THREE.MeshStandardMaterial({ color: '#6B7280', roughness: 0.85 });
      var bootMat = new THREE.MeshStandardMaterial({ color: '#4B5563', roughness: 0.9 });
      // Boots (rounded)
      mk(new THREE.CapsuleGeometry(0.06, 0.06, 4, 8), bootMat, -0.09, 0.08, 0.02, g);
      mk(new THREE.CapsuleGeometry(0.06, 0.06, 4, 8), bootMat,  0.09, 0.08, 0.02, g);
      // Legs — capsules
      mk(new THREE.CapsuleGeometry(0.055, 0.35, 4, 8), pd, -0.09, 0.40, 0, g);
      mk(new THREE.CapsuleGeometry(0.055, 0.35, 4, 8), pd,  0.09, 0.40, 0, g);
      // Hips — sphere
      mk(new THREE.SphereGeometry(0.16, 10, 8), pd, 0, 0.64, 0, g);
      // Torso — capsule (tapered via scale)
      var torso = mk(new THREE.CapsuleGeometry(0.15, 0.28, 5, 10), pm, 0, 0.92, 0, g);
      // Shoulders — sphere
      mk(new THREE.SphereGeometry(0.17, 10, 8), pm, 0, 1.1, 0, g);
      // Arms — capsules
      var a1 = mk(new THREE.CapsuleGeometry(0.04, 0.32, 4, 8), pm, -0.24, 0.88, 0, g); a1.rotation.z = 0.1;
      var a2 = mk(new THREE.CapsuleGeometry(0.04, 0.32, 4, 8), pm, 0.24, 0.88, 0, g); a2.rotation.z = -0.1;
      // Hands — small spheres
      mk(new THREE.SphereGeometry(0.04, 8, 6), pm, -0.27, 0.68, 0, g);
      mk(new THREE.SphereGeometry(0.04, 8, 6), pm,  0.27, 0.68, 0, g);
      // Neck
      mk(new THREE.CylinderGeometry(0.045, 0.055, 0.08, 8), pm, 0, 1.22, 0, g);
      // Head — sphere
      mk(new THREE.SphereGeometry(0.11, 12, 10), pm, 0, 1.38, 0, g);
      // Hard hat
      if (ppe && ppe.hardHat) {
        mk(new THREE.SphereGeometry(0.14, 14, 8, 0, Math.PI*2, 0, Math.PI*0.5), pm, 0, 1.42, 0, g);
        mk(new THREE.CylinderGeometry(0.17, 0.17, 0.025, 16), pm, 0, 1.44, 0, g);
      }
      return g;
    }

    // ── EXCAVATOR ──
    function fallbackExcavator() {
      var g = new THREE.Group();
      // Tracks — rounded capsule shape with sprocket drums
      [-1.1, 1.1].forEach(function(x) {
        // Track body — capsule laid flat
        var track = mk(new THREE.CapsuleGeometry(0.22, 2.8, 5, 12), darkMat, x, 0.22, 0, g);
        track.rotation.x = Math.PI/2;
        // Track top rail
        rbox(0.38, 0.06, 2.6, 0.03, darkMat, x, 0.46, 0, g);
        // Drive sprocket (rear)
        mkr(new THREE.CylinderGeometry(0.26, 0.26, 0.32, 14), darkMat, x, 0.24, -1.5, 0, 0, Math.PI/2, g);
        // Idler (front)
        mkr(new THREE.CylinderGeometry(0.20, 0.20, 0.32, 14), darkMat, x, 0.24, 1.5, 0, 0, Math.PI/2, g);
      });
      // Turntable
      mk(new THREE.CylinderGeometry(0.95, 1.05, 0.18, 24), bodyMat, 0, 0.58, 0, g);
      // Upper body — rounded
      rbox(2.0, 0.85, 2.3, 0.2, bodyMat, 0, 0.65, -0.15, g);
      // Counterweight (rear — half cylinder)
      var cw = mk(new THREE.CylinderGeometry(1.0, 1.0, 0.8, 20, 1, false, Math.PI*0.65, Math.PI*0.7), bodyMat, 0, 1.1, -0.2, g);
      // Engine deck (rounded)
      rbox(1.7, 0.3, 1.1, 0.12, bodyMat, 0, 1.5, -0.75, g);
      // Cab — rounded
      rbox(1.15, 0.95, 1.2, 0.12, bodyMat, -0.3, 1.5, 0.45, g);
      // Cab windows (planes — thin and clean)
      mk(new THREE.PlaneGeometry(0.95, 0.65), glassMat, -0.3, 2.05, 1.06, g);
      mk(new THREE.PlaneGeometry(1.0, 0.65), glassMat, -0.86, 2.05, 0.45, g).rotation.y = -Math.PI/2;
      mk(new THREE.PlaneGeometry(1.0, 0.65), glassMat, 0.26, 2.05, 0.45, g).rotation.y = Math.PI/2;
      // Boom — capsule
      var boom = mk(new THREE.CapsuleGeometry(0.14, 2.6, 4, 10), bodyMat, 0.35, 2.0, 2.1, g);
      boom.rotation.x = Math.PI/2 + 0.3;
      // Stick — thinner capsule
      var stick = mk(new THREE.CapsuleGeometry(0.11, 1.8, 4, 8), bodyMat, 0.35, 1.3, 3.7, g);
      stick.rotation.x = Math.PI/2 - 0.4;
      // Bucket — curved scoop
      var bkt = mk(new THREE.CylinderGeometry(0.4, 0.4, 0.85, 10, 1, true, -0.9, 1.8), metalMat, 0.35, 0.35, 4.6, g);
      // Bucket teeth
      for (var et = -0.3; et <= 0.3; et += 0.12) {
        mk(new THREE.ConeGeometry(0.03, 0.1, 5), darkMat, 0.35+et, 0.15, 4.9, g).rotation.x = Math.PI/2;
      }
      // Hydraulic cylinders (thin capsules)
      var hyd1 = mk(new THREE.CapsuleGeometry(0.03, 1.2, 3, 6), metalMat, 0.35, 2.4, 1.4, g);
      hyd1.rotation.x = Math.PI/2 + 0.5;
      return g;
    }

    // ── DUMP TRUCK ──
    function fallbackDumpTruck() {
      var g = new THREE.Group();
      var hubMat = new THREE.MeshStandardMaterial({ color: '#6B7280', metalness: 0.3, roughness: 0.5 });
      // Chassis — rounded rail
      rbox(0.7, 0.22, 5.6, 0.08, darkMat, 0, 0.45, 0, g);
      // Hood/engine — smooth rounded shape
      rbox(1.9, 0.85, 0.9, 0.2, bodyMat, 0, 0.85, 3.4, g);
      // Cab — rounded
      rbox(2.0, 1.25, 1.3, 0.2, bodyMat, 0, 1.0, 2.2, g);
      // Cab roof — rounded
      rbox(2.05, 0.08, 1.4, 0.15, bodyMat, 0, 2.28, 2.25, g);
      // Windshield — slight curve
      mk(new THREE.CylinderGeometry(1.8, 1.8, 1.75, 12, 1, true, -0.28, 0.56), glassMat, 0, 1.8, 2.55, g);
      // Side windows
      mk(new THREE.PlaneGeometry(0.95, 0.7), glassMat, -0.98, 1.75, 2.2, g).rotation.y = -Math.PI/2;
      mk(new THREE.PlaneGeometry(0.95, 0.7), glassMat,  0.98, 1.75, 2.2, g).rotation.y = Math.PI/2;
      // Dump bed floor — slight curve
      rbox(2.15, 0.1, 3.6, 0.06, metalMat, 0, 0.88, -0.65, g);
      // Dump bed sides — slight inward taper at top
      mk(new THREE.PlaneGeometry(3.6, 1.0), metalMat, -1.05, 1.38, -0.65, g).rotation.y = -Math.PI/2;
      mk(new THREE.PlaneGeometry(3.6, 1.0), metalMat,  1.05, 1.38, -0.65, g).rotation.y = Math.PI/2;
      // Bed front wall
      rbox(2.1, 1.15, 0.06, 0.04, metalMat, 0, 0.93, 1.15, g);
      // Tailgate
      rbox(2.1, 0.65, 0.06, 0.04, metalMat, 0, 1.1, -2.5, g);
      // Front wheels
      mkWheel(0.45, 0.35, -1.15, 0.45, 2.8, g, darkMat, hubMat);
      mkWheel(0.45, 0.35,  1.15, 0.45, 2.8, g, darkMat, hubMat);
      // Rear dual wheels
      mkWheel(0.5, 0.28, -1.2, 0.5, -1.2, g, darkMat, hubMat);
      mkWheel(0.5, 0.28, -0.85, 0.5, -1.2, g, darkMat, hubMat);
      mkWheel(0.5, 0.28,  0.85, 0.5, -1.2, g, darkMat, hubMat);
      mkWheel(0.5, 0.28,  1.2, 0.5, -1.2, g, darkMat, hubMat);
      // Rounded fenders (front)
      [-1.15, 1.15].forEach(function(x) {
        var f = mk(new THREE.SphereGeometry(0.32, 10, 6, 0, Math.PI*2, 0, Math.PI*0.5), bodyMat, x, 0.7, 2.8, g);
        f.scale.set(1, 0.5, 1);
      });
      return g;
    }

    // ── DOZER ──
    function fallbackDozer() {
      var g = new THREE.Group();
      // Tracks — capsule profile
      [-1.15, 1.15].forEach(function(x) {
        var track = mk(new THREE.CapsuleGeometry(0.24, 2.8, 5, 12), darkMat, x, 0.24, 0, g);
        track.rotation.x = Math.PI/2;
        rbox(0.42, 0.06, 2.6, 0.03, darkMat, x, 0.5, 0, g);
        mkr(new THREE.CylinderGeometry(0.28, 0.28, 0.38, 14), darkMat, x, 0.26, 1.55, 0, 0, Math.PI/2, g);
        mkr(new THREE.CylinderGeometry(0.22, 0.22, 0.38, 14), darkMat, x, 0.24, -1.55, 0, 0, Math.PI/2, g);
      });
      // Main body — rounded
      rbox(1.9, 0.85, 2.3, 0.2, bodyMat, 0, 0.55, -0.1, g);
      // Engine deck — rounded
      rbox(1.7, 0.4, 1.1, 0.12, bodyMat, 0, 1.4, -0.65, g);
      // Cab — rounded
      rbox(1.3, 0.95, 1.2, 0.12, bodyMat, 0, 1.4, 0.3, g);
      // Windows
      mk(new THREE.PlaneGeometry(1.05, 0.65), glassMat, 0, 1.95, 0.9, g);
      mk(new THREE.PlaneGeometry(1.0, 0.65), glassMat, -0.63, 1.95, 0.3, g).rotation.y = -Math.PI/2;
      mk(new THREE.PlaneGeometry(1.0, 0.65), glassMat, 0.63, 1.95, 0.3, g).rotation.y = Math.PI/2;
      // Blade — curved via cylinder segment
      var blade = mk(new THREE.CylinderGeometry(1.6, 1.6, 2.9, 14, 1, true, -0.35, 0.7), metalMat, 0, 0.5, 2.0, g);
      // Blade top edge — rounded
      mk(new THREE.CylinderGeometry(0.04, 0.04, 2.9, 8), metalMat, 0, 1.0, 1.65, g).rotation.z = Math.PI/2;
      // Push arms — capsules
      [-0.85, 0.85].forEach(function(x) {
        var arm = mk(new THREE.CapsuleGeometry(0.06, 1.0, 3, 6), darkMat, x, 0.5, 1.3, g);
        arm.rotation.x = Math.PI/2;
      });
      // Ripper (rear)
      mk(new THREE.CapsuleGeometry(0.04, 0.5, 3, 6), darkMat, 0, 0.25, -1.8, g);
      return g;
    }

    // ── TRAFFIC CONE ──
    function fallbackCone() {
      var g = new THREE.Group();
      var coneMat = new THREE.MeshStandardMaterial({ color: '#9CA3AF', metalness: 0.1, roughness: 0.7 });
      var stripeMat = new THREE.MeshStandardMaterial({ color: '#D1D5DB', roughness: 0.5 });
      // Rubber base — rounded
      rbox(0.36, 0.03, 0.36, 0.04, darkMat, 0, 0, 0, g);
      // Cone body — smooth tapered cylinder
      mk(new THREE.CylinderGeometry(0.025, 0.14, 0.55, 16), coneMat, 0, 0.30, 0, g);
      // Reflective stripes
      mk(new THREE.CylinderGeometry(0.083, 0.098, 0.06, 16), stripeMat, 0, 0.18, 0, g);
      mk(new THREE.CylinderGeometry(0.052, 0.068, 0.06, 16), stripeMat, 0, 0.35, 0, g);
      // Rounded tip
      mk(new THREE.SphereGeometry(0.025, 8, 6), coneMat, 0, 0.57, 0, g);
      return g;
    }

    // ── JERSEY BARRIER — smooth tapered profile ──
    function fallbackBarrier() {
      var g = new THREE.Group();
      var concreteMat = new THREE.MeshStandardMaterial({ color: '#9CA3AF', metalness: 0.05, roughness: 0.85 });
      // Use a lathe to create the tapered jersey barrier profile
      var pts = [];
      pts.push(new THREE.Vector2(0.3, 0));
      pts.push(new THREE.Vector2(0.3, 0.15));
      pts.push(new THREE.Vector2(0.22, 0.35));
      pts.push(new THREE.Vector2(0.12, 0.65));
      pts.push(new THREE.Vector2(0.1, 0.8));
      pts.push(new THREE.Vector2(0.12, 0.82));
      pts.push(new THREE.Vector2(0, 0.82));
      var latheGeo = new THREE.LatheGeometry(pts, 4);
      var barrier = new THREE.Mesh(latheGeo, concreteMat);
      barrier.scale.set(1, 1, 2.2);
      g.add(barrier);
      return g;
    }

    var FALLBACKS = {
      wheel_loader: fallbackWheelLoader,
      person: fallbackPerson,
      excavator: fallbackExcavator,
      dump_truck: fallbackDumpTruck,
      dozer: fallbackDozer,
      cone: fallbackCone,
      barrier: fallbackBarrier
    };

    // =============================================
    // CREATE OBJECT — tries GLTF first, falls back to procedural
    // =============================================
    function createObject(type, opts, callback) {
      loadModel(type, function(gltfModel) {
        if (gltfModel) {
          callback(gltfModel);
        } else {
          var fn = FALLBACKS[type];
          callback(fn ? fn(opts) : new THREE.Group());
        }
      });
    }

    // =============================================
    // HOST MACHINE — the equipment this tablet is mounted on
    // =============================================
    var host = new THREE.Group();
    scene.add(host);
    createObject('wheel_loader', null, function(model) {
      host.add(model);
    });

    // =============================================
    // MOCK DETECTIONS
    // =============================================
    var mockObjects = [
      { id:'p1', cls:'person', path:function(t){return [Math.sin(t*.4)*3+2, 0, Math.cos(t*.4)*3+2]}, ppe:{hardHat:true,vest:true} },
      { id:'p2', cls:'person', path:function(t){return [-3+Math.sin(t*.3+1)*1.5, 0, 4+Math.cos(t*.5)*2]}, ppe:{hardHat:true,vest:false} },
      { id:'p3', cls:'person', path:function(t){return [Math.sin(t*.15)*4-1, 0, -4+Math.sin(t*.2)*1]}, ppe:{hardHat:false,vest:true} },
      { id:'ex1', cls:'excavator', path:function(){return [7,0,8]}, heading:-Math.PI/4 },
      { id:'dt1', cls:'dump_truck', path:function(t){return [-8+Math.sin(t*.15)*3, 0, 9]}, heading:Math.PI/2 },
      { id:'c1', cls:'cone', path:function(){return [4,0,5]} },
      { id:'c2', cls:'cone', path:function(){return [6,0,5]} },
      { id:'c3', cls:'cone', path:function(){return [8,0,5]} },
      { id:'c4', cls:'cone', path:function(){return [4,0,7]} },
      { id:'c5', cls:'cone', path:function(){return [8,0,7]} },
      { id:'b1', cls:'barrier', path:function(){return [-5,0,6]} },
      { id:'b2', cls:'barrier', path:function(){return [-5,0,8]} },
      { id:'dz1', cls:'dozer', path:function(){return [-7,0,-6]}, heading:Math.PI/6 }
    ];

    var detMeshes = {};
    var smoothing = {};

    mockObjects.forEach(function(obj) {
      var pos = obj.path(0);
      createObject(obj.cls, obj.ppe || null, function(mesh) {
        mesh.position.set(pos[0], pos[1], pos[2]);
        if (obj.heading !== undefined) mesh.rotation.y = obj.heading;
        scene.add(mesh);
        detMeshes[obj.id] = mesh;
      });
      smoothing[obj.id] = { pos: [pos[0], pos[1], pos[2]], rotY: obj.heading || 0 };
    });

    // =============================================
    // TOUCH ORBIT CONTROLS
    // =============================================
    var angle = Math.PI * 0.85;
    var pitch = 0.75;
    var dist = 22;
    var lookAt = new THREE.Vector3(0, 1.0, 2);
    var isDragging = false;
    var prevX = 0, prevY = 0;
    var pinchDist = 0;

    var canvas = renderer.domElement;
    canvas.addEventListener('pointerdown', function(e) {
      isDragging = true; prevX = e.clientX; prevY = e.clientY;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', function(e) {
      if (!isDragging) return;
      angle -= (e.clientX - prevX) * 0.005;
      pitch = Math.max(0.2, Math.min(1.5, pitch + (e.clientY - prevY) * 0.005));
      prevX = e.clientX; prevY = e.clientY;
    });
    canvas.addEventListener('pointerup', function(e) {
      isDragging = false;
      canvas.releasePointerCapture(e.pointerId);
    });
    canvas.addEventListener('wheel', function(e) {
      dist = Math.max(6, Math.min(35, dist + e.deltaY * 0.02));
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        var dx = e.touches[0].clientX - e.touches[1].clientX;
        var dy = e.touches[0].clientY - e.touches[1].clientY;
        pinchDist = Math.sqrt(dx*dx + dy*dy);
      }
    }, { passive: true });
    canvas.addEventListener('touchmove', function(e) {
      if (e.touches.length === 2) {
        var dx = e.touches[0].clientX - e.touches[1].clientX;
        var dy = e.touches[0].clientY - e.touches[1].clientY;
        var newDist = Math.sqrt(dx*dx + dy*dy);
        dist = Math.max(6, Math.min(35, dist + (pinchDist - newDist) * 0.05));
        pinchDist = newDist;
      }
    }, { passive: true });

    // =============================================
    // ANIMATION LOOP
    // =============================================
    var startTime = performance.now();
    var lastTime = startTime;

    function animate() {
      requestAnimationFrame(animate);
      var now = performance.now();
      var dt = Math.min((now - lastTime) / 1000, 0.1);
      var t = (now - startTime) / 1000;
      lastTime = now;

      camera.position.set(
        lookAt.x + Math.sin(angle) * Math.cos(pitch) * dist,
        lookAt.y + Math.sin(pitch) * dist,
        lookAt.z + Math.cos(angle) * Math.cos(pitch) * dist
      );
      camera.lookAt(lookAt);

      var closestDist = Infinity;
      var people = 0, equip = 0, markers = 0;

      mockObjects.forEach(function(obj) {
        var target = obj.path(t);
        var s = smoothing[obj.id];
        var mesh = detMeshes[obj.id];
        if (!s || !mesh) return;

        var alpha = 1 - Math.exp(-dt * 6);
        var px = s.pos[0], pz = s.pos[2];
        s.pos[0] += (target[0] - s.pos[0]) * alpha;
        s.pos[1] += (target[1] - s.pos[1]) * alpha;
        s.pos[2] += (target[2] - s.pos[2]) * alpha;
        mesh.position.set(s.pos[0], s.pos[1], s.pos[2]);

        if (obj.heading === undefined) {
          var vx = dt > 0 ? (s.pos[0] - px) / dt : 0;
          var vz = dt > 0 ? (s.pos[2] - pz) / dt : 0;
          if (Math.sqrt(vx*vx + vz*vz) > 0.3) {
            var tr = Math.atan2(vx, vz);
            var diff = tr - s.rotY;
            while (diff > Math.PI) diff -= 2*Math.PI;
            while (diff < -Math.PI) diff += 2*Math.PI;
            s.rotY += diff * (1 - Math.exp(-dt * 4));
            mesh.rotation.y = s.rotY;
          }
        }

        var d = Math.sqrt(s.pos[0]*s.pos[0] + s.pos[2]*s.pos[2]);
        if (d < closestDist) closestDist = d;
        if (obj.cls === 'person') people++;
        else if (obj.cls === 'excavator' || obj.cls === 'dump_truck' || obj.cls === 'dozer') equip++;
        else markers++;
      });

      document.getElementById('people-count').textContent = people;
      document.getElementById('equip-count').textContent = equip;
      document.getElementById('marker-count').textContent = markers;

      var nearestEl = document.getElementById('nearest-dist');
      var zone = closestDist < 3.5 ? 'danger' : closestDist < 6 ? 'warning' : 'safe';
      nearestEl.textContent = closestDist.toFixed(1) + 'm';
      nearestEl.style.color = zone === 'danger' ? '#EF4444' : zone === 'warning' ? '#F59E0B' : '#22384C';

      if (zone === 'danger') {
        alertBanner.style.display = 'block';
        alertBanner.textContent = 'DANGER \u2014 Object at ' + closestDist.toFixed(1) + 'm';
        document.getElementById('status-dot').className = 'dot dot-red';
      } else {
        alertBanner.style.display = 'none';
        document.getElementById('status-dot').className = 'dot dot-green';
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    loading.style.display = 'none';

  } catch(err) {
    loading.innerHTML = '<b style="color:red">JS ERROR:</b><br>' + err.message + '<br><pre style="font-size:11px;max-height:300px;overflow:auto">' + (err.stack || '') + '</pre>';
  }
})();
</script>
</body>
</html>
