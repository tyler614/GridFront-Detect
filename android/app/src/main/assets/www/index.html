<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F8F8F8">
<title>GridFront Detect</title>
<script>window.onerror=function(m,s,l,c,e){document.body.innerHTML='<pre style="color:red;padding:20px;font-size:14px">ERROR: '+m+'\nLine: '+l+'\nCol: '+c+'\n'+(e&&e.stack||'')+'</pre>';}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F8F8F8; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
  #canvas-container { width: 100vw; height: 100vh; }
  #hud { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); border-top: 2px solid #e5e7eb; padding: 10px 16px; font-size: 14px; color: #22384C; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding-bottom: max(10px, env(safe-area-inset-bottom)); z-index: 10; }
  .hud-item { display: flex; flex-direction: column; gap: 1px; }
  .hud-item .label { font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.5; }
  .hud-item .value { font-weight: 700; font-size: 16px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .dot-green { background: #22c55e; }
  .dot-red { background: #EF4444; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #header { position: fixed; top: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); border-bottom: 1px solid #e5e7eb; padding: 8px 16px; display: flex; align-items: center; gap: 10px; z-index: 10; padding-top: max(8px, env(safe-area-inset-top)); }
  #header .title { font-weight: 700; font-size: 15px; color: #22384C; }
  #header .subtitle { font-size: 11px; color: #6B7280; }
  #alert-banner { position: fixed; top: 56px; left: 12px; right: 12px; background: #FEF2F2; border: 2px solid #EF4444; border-radius: 8px; padding: 10px 14px; font-size: 15px; font-weight: 700; color: #991B1B; display: none; z-index: 10; text-align: center; }
</style>
</head>
<body>
<div id="header">
  <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
    <rect x="1" y="1" width="8" height="8" rx="2" fill="#4A84BF"/>
    <rect x="12" y="1" width="8" height="8" rx="2" fill="#3CABD6"/>
    <rect x="23" y="1" width="8" height="8" rx="2" fill="#90D2E8"/>
    <rect x="1" y="12" width="8" height="8" rx="2" fill="#4A84BF"/>
    <rect x="12" y="12" width="8" height="8" rx="2" fill="#3CABD6"/>
    <rect x="23" y="12" width="8" height="8" rx="2" fill="#90D2E8"/>
    <rect x="1" y="23" width="8" height="8" rx="2" fill="#4A84BF"/>
    <rect x="12" y="23" width="8" height="8" rx="2" fill="#3CABD6"/>
    <rect x="23" y="23" width="8" height="8" rx="2" fill="#90D2E8"/>
  </svg>
  <div>
    <div class="title">GridFront Detect</div>
    <div class="subtitle">CAT 950 GC — Wheel Loader #1</div>
  </div>
</div>
<div id="alert-banner"></div>
<div id="canvas-container"></div>
<div id="hud">
  <div class="hud-item"><span class="label"><span class="dot dot-green" id="status-dot"></span>Mock</span><span class="value" id="status-text">OK</span></div>
  <div class="hud-item"><span class="label">People</span><span class="value" id="people-count">0</span></div>
  <div class="hud-item"><span class="label">Equipment</span><span class="value" id="equip-count">0</span></div>
  <div class="hud-item"><span class="label">Markers</span><span class="value" id="marker-count">0</span></div>
  <div class="hud-item"><span class="label">Nearest</span><span class="value" id="nearest-dist">&mdash;</span></div>
</div>

<div id="loading" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font:16px system-ui;color:#22384C;z-index:100">Loading...</div>
<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script src="js/materials.js"></script>
<script src="js/models/wheel-loader.js"></script>
<script src="js/models/excavator.js"></script>
<script src="js/models/dump-truck.js"></script>
<script src="js/models/dozer.js"></script>
<script src="js/models/person.js"></script>
<script src="js/models/props.js"></script>
<script src="js/scene-manager.js"></script>
<script src="js/model-registry.js"></script>
<script src="js/detection-renderer.js"></script>
<script src="js/hud-controller.js"></script>
<script src="js/orbit-controls.js"></script>
<script src="js/app.js"></script>
</body>
</html>
